services:
  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/shipagent
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "shipagent", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ship-server:
    build: .
    ports:
      - "3847:3847"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: shipagent
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      PORT: 3847
      HOST: 0.0.0.0
      ALLOWED_EMAIL_DOMAIN: harness.io
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
